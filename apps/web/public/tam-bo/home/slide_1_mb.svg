  </defs>

  <rect width="750" height="900" fill="url(#skyPineMb)"/>

  <path d="M0 420 C160 360 320 360 750 420 V900 H0 Z" fill="url(#hillTeaMb1)"/>
  <path d="M0 520 C180 470 360 470 750 520 V900 H0 Z" fill="url(#hillTeaMb2)" opacity="0.95"/>
  <path d="M0 620 C200 580 400 580 750 620 V900 H0 Z" fill="url(#hillTeaMb3)" opacity="0.95"/>

