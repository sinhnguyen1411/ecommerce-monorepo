<svg xmlns="http://www.w3.org/2000/svg" width="750" height="900" viewBox="0 0 750 900" role="img" aria-labelledby="title desc">
  <title id="title">Pine forest and tea hills</title>
  <desc id="desc">Tea hills with pine silhouettes for mobile banner.</desc>
  <defs>
    <linearGradient id="skyPineMb" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#cfe9ff"/>
      <stop offset="60%" stop-color="#b5e1d2"/>
      <stop offset="100%" stop-color="#8cc58f"/>
    </linearGradient>
    <linearGradient id="hillTeaMb1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2f7d32"/>
      <stop offset="100%" stop-color="#6fbf5f"/>
    </linearGradient>
    <linearGradient id="hillTeaMb2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2b6d2e"/>
      <stop offset="100%" stop-color="#5daa58"/>
    </linearGradient>
    <linearGradient id="hillTeaMb3" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#245826"/>
      <stop offset="100%" stop-color="#4f9b4a"/>
