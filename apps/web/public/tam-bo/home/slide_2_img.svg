<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" role="img" aria-labelledby="title desc">
  <title id="title">Giải pháp sinh học Tam Bố</title>
  <desc id="desc">Banner Tam Bố với nền trời xanh và đường cong nông trại.</desc>
  <defs>
    <linearGradient id="sky2" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#e2f6ff"/>
      <stop offset="55%" stop-color="#b4e3ff"/>
      <stop offset="100%" stop-color="#84c58a"/>
    </linearGradient>
    <linearGradient id="field2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#3f8f2f"/>
      <stop offset="100%" stop-color="#9ad65b"/>
    </linearGradient>
    <linearGradient id="panel2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2f6f16"/>
      <stop offset="100%" stop-color="#5aa52a"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="560" fill="url(#sky2)"/>
  <path d="M0 320 C260 240 460 240 700 300 C980 370 1180 370 1400 320 V560 H0 Z" fill="url(#field2)"/>
  <path d="M0 400 C240 340 440 340 700 400 C980 460 1180 460 1400 400 V560 H0 Z" fill="#79bf4a" opacity="0.9"/>

  <rect x="870" y="0" width="530" height="560" fill="url(#panel2)"/>
  <circle cx="1080" cy="270" r="170" fill="#ffffff" stroke="#2f6f16" stroke-width="6"/>
  <circle cx="1080" cy="270" r="145" fill="#f2ffe4"/>
  <g transform="translate(1080 270)">
    <path d="M0 -80 C30 -70 60 -40 70 -5 C45 5 25 35 0 70 C-20 35 -35 10 -60 -5 C-45 -35 -20 -70 0 -80 Z" fill="#4f9f2e"/>
    <circle cx="40" cy="35" r="12" fill="#2f6f16"/>
    <circle cx="-30" cy="35" r="10" fill="#2f6f16"/>
  </g>

  <g fill="#ffffff" font-family="Roboto, Arial, sans-serif">
    <text x="70" y="130" font-size="24" font-weight="600" letter-spacing="1">Tam Bố - Giải pháp sinh học</text>
    <text x="70" y="210" font-size="44" font-weight="800">BẢO VỆ MÙA VỤ</text>
    <text x="70" y="270" font-size="40" font-weight="800">NÂNG CAO NĂNG SUẤT</text>
    <text x="70" y="330" font-size="36" font-weight="800">AN TOÀN - BỀN VỮNG</text>
  </g>

  <g fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" transform="translate(70 355)">
    <path d="M0 0 H40"/>
    <path d="M60 0 H100"/>
    <path d="M120 0 H160"/>
    <path d="M180 0 H220"/>
  </g>
</svg>
