    <path d="M-10 -40 C0 -70 40 -70 50 -40 C30 -20 10 0 -10 25 C-25 10 -30 -20 -10 -40 Z" fill="#5aa52a"/>
  </g>

  <g fill="#ffffff" font-family="Roboto, Arial, sans-serif">
    <text x="70" y="130" font-size="24" font-weight="600" letter-spacing="1">Nông dược Tam Bố</text>
    <text x="70" y="210" font-size="44" font-weight="800">ĐỒNG HÀNH CÙNG</text>
    <text x="70" y="270" font-size="40" font-weight="800">NHÀ NÔNG VIỆT</text>
    <text x="70" y="330" font-size="36" font-weight="800">HIỆU QUẢ - TIN CẬY</text>
