<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" role="img" aria-labelledby="title desc">
  <title id="title">Đồng hành cùng nhà nông</title>
  <desc id="desc">Banner Tam Bố với thông điệp đồng hành cùng nhà nông.</desc>
  <defs>
    <linearGradient id="sky3" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#e6f7ff"/>
      <stop offset="55%" stop-color="#c2e8ff"/>
      <stop offset="100%" stop-color="#8dd39c"/>
    </linearGradient>
    <linearGradient id="field3" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2f7d32"/>
      <stop offset="100%" stop-color="#98d75f"/>
    </linearGradient>
    <linearGradient id="panel3" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#3d7f1c"/>
      <stop offset="100%" stop-color="#6fbe35"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="560" fill="url(#sky3)"/>
  <path d="M0 310 C260 230 460 230 700 300 C980 370 1180 370 1400 310 V560 H0 Z" fill="url(#field3)"/>
  <path d="M0 390 C240 330 440 330 700 390 C980 450 1180 450 1400 390 V560 H0 Z" fill="#7fc54f" opacity="0.9"/>

  <rect x="880" y="0" width="520" height="560" fill="url(#panel3)"/>
  <circle cx="1085" cy="270" r="170" fill="#ffffff" stroke="#3d7f1c" stroke-width="6"/>
  <circle cx="1085" cy="270" r="145" fill="#efffe8"/>
  <g transform="translate(1085 270)">
