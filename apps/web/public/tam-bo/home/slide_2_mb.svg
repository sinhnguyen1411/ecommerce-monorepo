<svg xmlns="http://www.w3.org/2000/svg" width="750" height="900" viewBox="0 0 750 900" role="img" aria-labelledby="title desc">
  <title id="title">Giải pháp sinh học Tam Bố</title>
  <desc id="desc">Banner Tam Bố di động với thông điệp năng suất bền vững.</desc>
  <defs>
    <linearGradient id="sky2mb" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#e2f6ff"/>
      <stop offset="60%" stop-color="#b4e3ff"/>
      <stop offset="100%" stop-color="#84c58a"/>
    </linearGradient>
    <linearGradient id="field2mb" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#3f8f2f"/>
      <stop offset="100%" stop-color="#9ad65b"/>
    </linearGradient>
  </defs>

  <rect width="750" height="900" fill="url(#sky2mb)"/>
  <path d="M0 460 C180 380 360 380 750 460 V900 H0 Z" fill="url(#field2mb)"/>
  <path d="M0 560 C200 500 380 500 750 560 V900 H0 Z" fill="#79bf4a" opacity="0.9"/>

  <circle cx="375" cy="510" r="170" fill="#ffffff" stroke="#2f6f16" stroke-width="6"/>
  <circle cx="375" cy="510" r="145" fill="#f2ffe4"/>
  <g transform="translate(375 510)">
    <path d="M0 -80 C30 -70 60 -40 70 -5 C45 5 25 35 0 70 C-20 35 -35 10 -60 -5 C-45 -35 -20 -70 0 -80 Z" fill="#4f9f2e"/>
    <circle cx="40" cy="35" r="12" fill="#2f6f16"/>
    <circle cx="-30" cy="35" r="10" fill="#2f6f16"/>
  </g>

  <g fill="#ffffff" font-family="Roboto, Arial, sans-serif" text-anchor="middle">
    <text x="375" y="140" font-size="26" font-weight="600" letter-spacing="1">Tam Bố - Giải pháp sinh học</text>
    <text x="375" y="220" font-size="42" font-weight="800">BẢO VỆ MÙA VỤ</text>
    <text x="375" y="280" font-size="38" font-weight="800">NÂNG CAO NĂNG SUẤT</text>
    <text x="375" y="340" font-size="34" font-weight="800">AN TOÀN - BỀN VỮNG</text>
  </g>

  <g fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" transform="translate(220 365)">
    <path d="M0 0 H40"/>
    <path d="M60 0 H100"/>
    <path d="M120 0 H160"/>
    <path d="M180 0 H220"/>
  </g>
</svg>
