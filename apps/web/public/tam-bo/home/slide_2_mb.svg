<svg xmlns="http://www.w3.org/2000/svg" width="750" height="900" viewBox="0 0 750 900" role="img" aria-labelledby="title desc">
  <title id="title">Coffee hills</title>
  <desc id="desc">Warm sunrise over coffee hills for mobile banner.</desc>
  <defs>
