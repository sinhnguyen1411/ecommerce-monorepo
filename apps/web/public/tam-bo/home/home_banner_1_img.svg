<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Organic Master - Tam Bo</title>
  <desc id="desc">Banner tam thoi cho san pham Organic Master.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f1f8e9"/>
      <stop offset="100%" stop-color="#c5e1a5"/>
    </linearGradient>
  </defs>
  <rect width="900" height="520" fill="url(#bg2)"/>
  <rect x="520" y="60" width="300" height="400" rx="24" fill="#ffffff" stroke="#9ccc65" stroke-width="4"/>
  <g fill="#2e5d1f" font-family="Roboto, Arial, sans-serif">
    <text x="70" y="140" font-size="34" font-weight="800">ORGANIC MASTER</text>
    <text x="70" y="190" font-size="18">Giai phap huu co ben vung cho nha nong</text>
    <text x="70" y="230" font-size="16">Hinh anh tam thoi - se thay the bang anh that</text>
  </g>
  <g transform="translate(610 190)">
    <rect x="0" y="0" width="120" height="180" rx="20" fill="#ffcc80" stroke="#ef6c00" stroke-width="6"/>
    <rect x="20" y="20" width="80" height="100" rx="10" fill="#4caf50"/>
    <rect x="20" y="130" width="80" height="30" rx="6" fill="#1b5e20"/>
  </g>
  <g transform="translate(110 340)" fill="#558b2f">
    <rect x="0" y="0" width="260" height="20" rx="10"/>
    <rect x="0" y="40" width="220" height="20" rx="10"/>
    <rect x="0" y="80" width="240" height="20" rx="10"/>
  </g>
</svg>