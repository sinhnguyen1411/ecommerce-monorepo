<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Sustainable fields</title>
  <desc id="desc">Layered green fields with sunrise sky.</desc>
  <defs>
    <linearGradient id="skyField" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#d9f2ff"/>
      <stop offset="60%" stop-color="#bfe8d1"/>
      <stop offset="100%" stop-color="#8ac37f"/>
    </linearGradient>
    <linearGradient id="fieldA" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2f7d32"/>
      <stop offset="100%" stop-color="#7bbf5a"/>
