services:
  mysql:
    image: mysql:8.0
    container_name: tambo_mysql
    restart: unless-stopped
    env_file:
      - ./env/mysql.env
    ports:
      - "3007:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: dev
    container_name: tambo_api
    restart: unless-stopped
    env_file:
      - ./env/api.env
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ../apps/api:/app
      - api_go_pkg:/go/pkg/mod
      - api_uploads:/app/uploads
      - ../migrations:/app/migrations:ro
      - ../seed:/app/seed:ro
    command: ["sh", "-c", "go mod download && go run ."]

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      target: runner
    container_name: tambo_web
    restart: unless-stopped
    env_file:
      - ./env/web.env
    depends_on:
      - api
    ports:
      - "3000:3000"
    command: ["npm", "start"]

volumes:
  mysql_data:
  api_go_pkg:
  api_uploads:
